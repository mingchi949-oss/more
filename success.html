<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Order Done!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --accent: #00ffcc;
        --bg: #0a0a0a;
        --card: rgba(255, 255, 255, 0.03);
      }
      body {
        font-family: "Inter", sans-serif;
        text-align: center;
        margin: 0;
        background-color: var(--bg);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      .box {
        background: var(--card);
        border: 1px solid rgba(0, 255, 204, 0.2);
        padding: 50px 40px;
        border-radius: 24px;
        backdrop-filter: blur(10px);
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .check-icon {
        font-size: 5rem;
        margin-bottom: 20px;
        display: block;
      }
      h1 {
        color: var(--accent);
        font-weight: 900;
        letter-spacing: -1px;
        margin-bottom: 10px;
      }
      p {
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        margin-bottom: 25px;
      }
      .back-btn {
        display: inline-block;
        padding: 12px 30px;
        background: var(--accent);
        color: #000;
        text-decoration: none;
        font-weight: bold;
        border-radius: 12px;
        transition: 0.3s;
      }
      .back-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span class="check-icon">✅</span>
      <h1>Order Received!</h1>
      <p>Thank you for your purchase.</p>
      <p id="order-details">We are preparing your coffee now...</p>
      <a href="./web.html" class="back-btn">Back to Shop</a>
    </div>

    <script>
      // This JavaScript reads the URL to see what the customer bought
      const urlParams = new URLSearchParams(window.location.search);
      const item = urlParams.get("item");
      const qty = urlParams.get("qty");

      if (item && qty) {
        document.getElementById("order-details").innerText =
          `You ordered: ${qty}x ${item.replace("-", " ")}. We are preparing it now!`;
      }
    </script>
  </body>
</html>
